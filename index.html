               <Interior ss:Color="#DCE6F1" ss:Pattern="Solid"/>
              </Style>
              <Style ss:ID="sPercent">
               <NumberFormat ss:Format="0%"/>
              </Style>
              <Style ss:ID="sProjectPercent">
               <Font ss:FontName="Calibri" x:Family="Swiss" ss:Size="11" ss:Color="#000000" ss:Bold="1"/>
               <Interior ss:Color="#DCE6F1" ss:Pattern="Solid"/>
               <NumberFormat ss:Format="0%"/>
              </Style>
             </Styles>
             <Worksheet ss:Name="Project Schedule">
              <Table>
               <Column ss:Width="80"/>
               <Column ss:Width="200"/>
               <Column ss:Width="80"/>
               <Column ss:Width="80"/>
               <Column ss:Width="80"/>
               <Column ss:Width="60"/>
               <Column ss:Width="80"/>
               <Column ss:Width="200"/>
               <Row>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">Type</Data></Cell>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">Task Name</Data></Cell>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">PIC</Data></Cell>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">Status</Data></Cell>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">Progress</Data></Cell>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">Start Date</Data></Cell>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">End Date</Data></Cell>
                <Cell ss:StyleID="sHeader"><Data ss:Type="String">Remark</Data></Cell>
               </Row>`;

            exportItems.forEach(item => {
                const isProj = item.type === 'Project' || item.type === 'Job';
                const styleId = isProj ? 'sProject' : 'Default';
                const stylePercentId = isProj ? 'sProjectPercent' : 'sPercent';
                const indent = "&#160;&#160;&#160;&#160;".repeat(item.level);

                xml += `
                 <Row>
                  <Cell ss:StyleID="${styleId}"><Data ss:Type="String">${escapeXml(item.type)}</Data></Cell>
                  <Cell ss:StyleID="${styleId}"><Data ss:Type="String">${indent}${escapeXml(item.taskName)}</Data></Cell>
                  <Cell ss:StyleID="${styleId}"><Data ss:Type="String">${escapeXml(item.pic)}</Data></Cell>
                  <Cell ss:StyleID="${styleId}"><Data ss:Type="String">${escapeXml(item.status)}</Data></Cell>
                  <Cell ss:StyleID="${stylePercentId}"><Data ss:Type="Number">${Math.round(item.progress || 0) / 100}</Data></Cell>
                  <Cell ss:StyleID="${styleId}"><Data ss:Type="String">${escapeXml(item.startDate)}</Data></Cell>
                  <Cell ss:StyleID="${styleId}"><Data ss:Type="String">${escapeXml(item.endDate)}</Data></Cell>
                  <Cell ss:StyleID="${styleId}"><Data ss:Type="String">${escapeXml(item.remark)}</Data></Cell>
                 </Row>`;
            });

            xml += `
              </Table>
             </Worksheet>
            </Workbook>`;

            const blob = new Blob([xml], { type: "application/vnd.ms-excel" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `ProjectPlan_${getTodayStr()}.xls`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        const App = () => {
            const [items, setItems] = useState([]);
            const [history, setHistory] = useState([]);
            const [view, setView] = useState('gantt');
            const [scale, setScale] = useState('day');
            const [isLoaded, setIsLoaded] = useState(false);
            const [collapsedIds, setCollapsedIds] = useState([]);
            const [frozenColumn, setFrozenColumn] = useState('taskName');
            const [dbError, setDbError] = useState(null);
            const [colWidths, setColWidths] = useState({
                taskName: 200, pic: 48, progress: 55, startDate: 80, endDate: 80, status: 75, remark: 90, act: 48
            });
            const [picFilter, setPicFilter] = useState('All');
            const [statusFilter, setStatusFilter] = useState('All');

            const fileInputRef = useRef(null);
            const dragStartStateRef = useRef(null);

            const autoSizeColumns = (currentItems) => {
                let maxTaskName = 200;
                let maxPic = 48;
                let maxStatus = 75;

                const getLevel = (id, itemsRef, currentLevel = 0) => {
                    const node = itemsRef.find(i => i.id === id);
                    if (node && node.parentId) return getLevel(node.parentId, itemsRef, currentLevel + 1);
                    return currentLevel;
                };

                currentItems.forEach(item => {
                    const level = getLevel(item.id, currentItems);
                    const taskNameWidth = (item.taskName?.length || 0) * 7.5 + (level * 24) + 80;
                    if (taskNameWidth > maxTaskName) maxTaskName = taskNameWidth;

                    const picWidth = (item.pic?.length || 0) * 7.5 + 24;
                    if (picWidth > maxPic) maxPic = picWidth;

                    const statusWidth = (item.status?.length || 0) * 7.5 + 32;
                    if (statusWidth > maxStatus) maxStatus = statusWidth;
                });

                setColWidths(prev => ({
                    ...prev,
                    taskName: Math.max(prev.taskName, maxTaskName),
                    pic: Math.max(prev.pic, maxPic),
                    status: Math.max(prev.status, maxStatus),
                    progress: Math.max(prev.progress || 0, 55),
                    remark: 95 
                }));
            };

            useEffect(() => {
                const dbRef = db.ref('projects/main/items');
                
                const unsubscribe = dbRef.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        let data = snapshot.val();
                        if (typeof data === 'object' && !Array.isArray(data)) {
                            data = Object.values(data);
                        }
                        
                        const validData = Array.isArray(data) ? data.filter(Boolean).map(item => ({
                            ...item,
                            parentId: item.parentId || null,
                            predecessors: item.predecessors || [],
                            milestoneConfig: {
                                type: item.milestoneConfig?.type || 'star',
                                items: item.milestoneConfig?.items || []
                            }
                        })) : [];
                        
                        setItems(validData);
                        autoSizeColumns(validData);
                    } else {
                        setItems([]);
                    }
                    setIsLoaded(true);
                }, (error) => {
                    console.error("Firebase load error:", error);
                    setDbError(error.message);
                    setIsLoaded(true);
                });

                const savedWidths = localStorage.getItem('gantt_v1_col_widths');
                if (savedWidths) {
                    try { 
                        const parsedWidths = JSON.parse(savedWidths);
                        setColWidths(prev => ({
                            ...prev,
                            ...parsedWidths,
                            taskName: Math.max(parsedWidths.taskName, prev.taskName),
                            pic: Math.max(parsedWidths.pic, prev.pic),
                            progress: Math.max(parsedWidths.progress || 0, 55),
                            remark: 95 
                        }));
                    } catch(e) { console.error(e); }
                }
                
                const savedFreeze = localStorage.getItem('gantt_v1_frozen_col');
                if (savedFreeze) setFrozenColumn(savedFreeze);

                return () => dbRef.off('value', unsubscribe);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('gantt_v1_col_widths', JSON.stringify(colWidths));
                    localStorage.setItem('gantt_v1_frozen_col', frozenColumn);
                }
            }, [colWidths, frozenColumn, isLoaded]);

            const startPreview = () => {
                if (!dragStartStateRef.current) {
                    dragStartStateRef.current = items;
                }
            };

            const previewDates = (id, newStart, newEnd) => {
                startPreview();
                const newItems = items.map(i => i.id === id ? { ...i, startDate: newStart, endDate: newEnd } : i);
                updateState(newItems, id, false); 
            };

            const updateState = (newItems, originTaskId = null, saveHistory = true) => {
                let cascadedItems = newItems;
                if (originTaskId) {
                    cascadedItems = cascadeDependencies(newItems, originTaskId);
                }

                const finalItems = recalculateTree(cascadedItems);
                
                if (saveHistory) {
                    const stateToSave = dragStartStateRef.current || items;
                    if (JSON.stringify(stateToSave) !== JSON.stringify(finalItems)) {
                        setHistory(prev => [...prev.slice(-10), stateToSave]);
                    }
                    dragStartStateRef.current = null; 
                }
                
                setItems(finalItems);
                autoSizeColumns(finalItems);

                db.ref('projects/main/items').set(finalItems).catch(error => {
                    console.error("Firebase save error:", error);
                    setDbError("ไม่สามารถบันทึกข้อมูลได้: " + error.message);
                });
            };

            const handleUndo = () => {
                if (history.length > 0) {
                    const previousState = history[history.length - 1];
                    updateState(previousState, null, false);
                    setHistory(prev => prev.slice(0, -1));
                }
            };

            const toggleCollapse = (id) => {
                setCollapsedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const handleUpdateField = (id, field, value) => {
                if (id === null && field === 'FILTER_PIC') { setPicFilter(value); return; }
                if (id === null && field === 'FILTER_STATUS') { setStatusFilter(value); return; }

                const newItems = items.map(item => 
                    item.id === id ? { ...item, [field]: (field === 'progress' ? Number(value) : value) } : item
                );
                const isDateChange = field === 'startDate' || field === 'endDate';
                updateState(newItems, isDateChange ? id : null, true);
            };

            const updateDates = (id, newStart, newEnd) => {
                const newItems = items.map(i => i.id === id ? { ...i, startDate: newStart, endDate: newEnd } : i);
                updateState(newItems, id, true); 
            };

            const handleAddDependency = (sourceId, targetId) => {
                if (sourceId === targetId) return; 
                const targetTask = items.find(i => i.id === targetId);
                const currentPreds = targetTask.predecessors || [];
                
                if (currentPreds.includes(sourceId)) return; 

                const checkCycle = (currId, targetSearchId, visited = new Set()) => {
                    if (currId === targetSearchId) return true;
                    if (visited.has(currId)) return false;
                    visited.add(currId);
                    const task = items.find(i => i.id === currId);
                    if (!task || !task.predecessors) return false;
                    for (let pId of task.predecessors) {
                        if (checkCycle(pId, targetSearchId, visited)) return true;
                    }
                    return false;
                };

                if (checkCycle(sourceId, targetId)) {
                    return; 
                }

                const newItems = items.map(i => 
                    i.id === targetId ? { ...i, predecessors: [...currentPreds, sourceId] } : i
                );
                updateState(newItems, sourceId, true);
            };

            const handleRemoveDependencies = (targetId, specificSourceId = null) => {
                const newItems = items.map(i => {
                    if (specificSourceId) {
                        if (i.id === targetId) {
                            return { ...i, predecessors: (i.predecessors || []).filter(p => p !== specificSourceId) };
                        }
                        return i;
                    } else {
                        let newPreds = i.predecessors || [];
                        if (i.id === targetId) {
                            newPreds = []; 
                        } else {
                            newPreds = newPreds.filter(p => p !== targetId); 
                        }
                        return { ...i, predecessors: newPreds };
                    }
                });
                updateState(newItems, null, true);
            };

            const handleAddChild = (targetId, newType, relation = 'child') => {
                const target = items.find(i => i.id === targetId);
                let parentId = target.parentId;
                let projectPic = target.pic || '';

                if (relation === 'child') {
                    parentId = target.id;
                }

                let root = items.find(i => i.id === parentId) || target;
                let safeCounter = 0;
                while (root && root.parentId && safeCounter < 10) {
                    root = items.find(i => i.id === root.parentId) || root;
                    safeCounter++;
                }
                projectPic = root.pic || '';

                const sortedItems = [...items].sort((a,b) => a.sortOrder - b.sortOrder);
                const targetIndex = sortedItems.findIndex(i => i.id === targetId);
                
                const getDescendants = (pId) => {
                    let desc = sortedItems.filter(i => i.parentId === pId);
                    let all = [...desc];
                    desc.forEach(d => { all = all.concat(getDescendants(d.id)); });
                    return all;
                };
                
                let insertAfterIndex = targetIndex;
                if (relation === 'child' || relation === 'sibling') {
                     const descs = getDescendants(target.id);
                     if (descs.length > 0) {
                         const lastDescId = descs[descs.length - 1].id;
                         insertAfterIndex = sortedItems.findIndex(i => i.id === lastDescId);
                     }
                }

                const shiftedItems = sortedItems.map((item, idx) => ({
                    ...item,
                    sortOrder: idx * 10
                }));

                const gapIndex = insertAfterIndex;
                const finalNewOrder = shiftedItems[gapIndex].sortOrder + 5;

                const newItem = {
                    id: generateId(), 
                    parentId, 
                    type: newType, 
                    taskName: `New ${newType}`, 
                    pic: projectPic, 
                    startDate: target.startDate || getTodayStr(), 
                    endDate: target.endDate || addDays(getTodayStr(), 1), 
                    progress: 0, 
                    status: 'Not Started', 
                    remark: '', 
                    sortOrder: finalNewOrder, 
                    predecessors: [],
                    milestoneConfig: { type: 'star', items: [] }
                };

                const allItemsNew = [...shiftedItems, newItem];
                allItemsNew.sort((a,b) => a.sortOrder - b.sortOrder);
                allItemsNew.forEach((item, idx) => item.sortOrder = idx + 1);

                updateState(allItemsNew, null, true);

                if (relation === 'child' && collapsedIds.includes(parentId)) {
                    toggleCollapse(parentId);
                } else if (relation === 'child' && collapsedIds.includes(targetId)) {
                    toggleCollapse(targetId);
                }
            };

            const handleAddNewRoot = (e) => {
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                const newItem = {
                    id: generateId(), parentId: null, type: 'Project', taskName: 'New Project', 
                    pic: '', startDate: getTodayStr(), endDate: addDays(getTodayStr(), 7), 
                    progress: 0, status: 'Not Started', remark: '', sortOrder: items.length + 1, predecessors: [],
                    milestoneConfig: { type: 'star', items: [] }
                };
                updateState([...items, newItem], null, true);
            };

            const handleDeleteItem = (id) => {
                const getIdsToDelete = (parentId) => {
                    let ids = [parentId];
                    items.filter(i => i.parentId === parentId).forEach(child => {
                        ids = ids.concat(getIdsToDelete(child.id));
                    });
                    return ids;
                };
                const idsToDelete = getIdsToDelete(id);
                const newItems = items.filter(i => !idsToDelete.includes(i.id)).map(i => ({
                    ...i,
                    predecessors: (i.predecessors || []).filter(pId => !idsToDelete.includes(pId))
                }));
                updateState(newItems, null, true);
            };

            const handleImportClick = () => fileInputRef.current.click();
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const lines = evt.target.result.split('\n');
                    if (lines.length < 2) return;
                    const parsed = [];
                    for (let i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        const row = parseCSVLine(lines[i]);
                        if(row.length >= 11) {
                            const predsRaw = row[11] ? row[11].replace(/^"|"$/g, '') : "";
                            const predecessors = predsRaw ? predsRaw.split(';') : [];

                            parsed.push({
                                id: row[0], parentId: row[1] || null, type: row[2], taskName: row[3].replace(/^"|"$/g, ''),
                                pic: row[4].replace(/^"|"$/g, ''), status: row[5], progress: Number(row[6]),
                                startDate: row[7], endDate: row[8], remark: row[9].replace(/^"|"$/g, ''), 
                                sortOrder: Number(row[10]), predecessors,
                                milestoneConfig: { type: 'star', items: [] }
                            });
                        }
                    }
                    updateState(parsed, null, true);
                    e.target.value = null; 
                };
                reader.readAsText(file);
            };

            if (!isLoaded) return <div className="p-10 text-center flex items-center justify-center h-screen"><span className="animate-pulse text-blue-500 font-bold">Connecting to Live Database...</span></div>;

            return (
                <div className="flex flex-col h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">
                    
                    {dbError ? (
                        <div className="bg-rose-100 text-rose-800 px-4 py-2 text-xs flex justify-center items-center gap-2 border-b border-rose-200">
                            <Icons.Warning />
                            <span><strong>Database Error:</strong> {dbError}</span>
                        </div>
                    ) : (
                        <div className="bg-emerald-100 text-emerald-800 px-4 py-2 text-xs flex justify-center items-center gap-2 border-b border-emerald-200">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                            <span><strong>Live Connected:</strong> ข้อมูลจะซิงค์แบบ Real-time</span>
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 shadow-sm px-6 py-3 flex items-center justify-between z-40">
                        <div className="flex items-center gap-6">
                            <h1 className="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 tracking-tight">
                                Project Manager
                            </h1>
                            <nav className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => setView('dashboard')} className={`px-4 py-1.5 text-sm font-medium rounded-md flex items-center gap-2 transition-colors ${view === 'dashboard' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icons.Dashboard /> Dashboard
                                </button>
                                <button onClick={() => setView('gantt')} className={`px-4 py-1.5 text-sm font-medium rounded-md flex items-center gap-2 transition-colors ${view === 'gantt' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icons.Gantt /> Schedule
                                </button>
                            </nav>
                        </div>

                        <div className="flex items-center gap-3">
                            {view === 'gantt' && (
                                <div className="flex bg-slate-100 p-1 rounded-lg mr-4 border border-slate-200">
                                    {['day', 'week', 'month'].map(s => (
                                        <button key={s} onClick={() => setScale(s)} className={`px-3 py-1 text-xs font-bold rounded capitalize ${scale === s ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>
                                            {s}
                                        </button>
                                    ))}
                                </div>
                            )}
                            
                            <div className="h-6 w-px bg-slate-200 mx-2"></div>

                            <button onClick={handleUndo} disabled={history.length === 0} className="p-2 text-slate-500 hover:text-slate-800 disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Undo last action">
                                <Icons.Undo />
                            </button>
                            
                            <div className="flex gap-2">
                                <button onClick={handleImportClick} className="px-3 py-1.5 text-xs font-semibold bg-slate-100 text-slate-700 hover:bg-slate-200 rounded border border-slate-300 flex items-center gap-1 transition-colors">
                                    <Icons.Upload /> Import CSV
                                </button>
                                <input type="file" ref={fileInputRef} onChange={handleFileChange} accept=".csv" className="hidden" />
                                
                                <button onClick={() => exportToCSV(items)} className="px-3 py-1.5 text-xs font-semibold bg-slate-100 text-slate-700 hover:bg-slate-200 rounded border border-slate-300 flex items-center gap-1 transition-colors">
                                    <Icons.Download /> CSV
                                </button>

                                <button onClick={() => exportToExcel(items)} className="px-3 py-1.5 text-xs font-semibold bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded border border-emerald-300 flex items-center gap-1 transition-colors">
                                    <Icons.Excel /> Excel
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden">
                        {view === 'dashboard' ? (
                            <Dashboard items={items} />
                        ) : (
                            <GanttChart 
                                items={items} 
                                scale={scale} 
                                onUpdateField={handleUpdateField}
                                onAddChild={handleAddChild}
                                onDelete={handleDeleteItem} 
                                updateDates={updateDates}
                                previewDates={previewDates}
                                collapsedIds={collapsedIds}
                                toggleCollapse={toggleCollapse}
                                colWidths={colWidths}
                                setColWidths={setColWidths}
                                handleAddDependency={handleAddDependency}
                                handleRemoveDependencies={handleRemoveDependencies}
                                frozenColumn={frozenColumn}
                                setFrozenColumn={setFrozenColumn}
                                picFilter={picFilter}
                                statusFilter={statusFilter}
                                handleAddNewRoot={handleAddNewRoot}
                            />
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
