        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: #f8fafc; }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {

        .dependency-line {
            stroke: #94a3b8;

            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 2, 4;
            animation: dash 20s linear infinite;
        }
        
        .dependency-line.solid {
            stroke: #cbd5e1;
            stroke-dasharray: 2, 4;

        @keyframes dash {
            to { stroke-dashoffset: 400; }

    <script type="text/babel">
        const firebaseConfig = {

            measurementId: "G-1S1EVTSVJY",

        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const { useState, useEffect, useRef, useMemo } = React;

        const parseDate = (dateStr) => {
            if (!dateStr) return new Date();
            const [y, m, d] = dateStr.split('.');
            return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
        };

        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}.${m}.${d}`;
        };

        const getTodayStr = () => formatDate(new Date());

        const addDays = (dateStr, days) => {
            const d = parseDate(dateStr);
            d.setDate(d.getDate() + days);
            return formatDate(d);
        };

        const diffDays = (startStr, endStr) => {
            const start = parseDate(startStr);
            const end = parseDate(endStr);
            const diffTime = Math.abs(end - start);
            return Math.round(diffTime / (1000 * 60 * 60 * 24));
        };

        const shortDate = (dateStr) => {
            if (!dateStr) return '';
            const d = parseDate(dateStr);
            const day = String(d.getDate()).padStart(2, '0');
            const month = d.toLocaleDateString('en-US', { month: 'short' });
            const year = String(d.getFullYear()).substring(2);
            return `${day} ${month} ${year}`;
        };

        const calculateStatus = (progress, startDateStr, endDateStr) => {
            if (progress >= 100) return 'Complete';
            if (!startDateStr || !endDateStr) return 'Not Started';

            const start = parseDate(startDateStr);
            const end = parseDate(endDateStr);
            const evalDate = new Date(); 
            evalDate.setHours(0, 0, 0, 0); 

            if (evalDate < start) {
                if (progress > 0) return 'In Progress';
                return 'Not Started';
            }

            const totalDurationDays = diffDays(startDateStr, endDateStr) + 1;
            const elapsedDays = diffDays(startDateStr, formatDate(evalDate)); 

            let percentPlan = 100;
            if (totalDurationDays > 0) {
                percentPlan = (elapsedDays / totalDurationDays) * 100;
                percentPlan = Math.max(0, Math.min(100, percentPlan)); 
            }

            if (progress < (percentPlan - 0.5)) return 'Delay';
            if (progress > 0) return 'In Progress';
            return 'Not Started';
        };

        const recalculateTree = (items) => {
            let newItems = JSON.parse(JSON.stringify(items));
            const getChildren = (parentId) => newItems.filter(item => item.parentId === parentId);

            const calcNode = (node) => {
                const children = getChildren(node.id);
                children.forEach(child => calcNode(child));

                if (children.length === 0 || node.type === 'Milestone') {
                    if (node.type !== 'Milestone') {
                        node.status = calculateStatus(node.progress, node.startDate, node.endDate);
                    }
                    return node;
                }
                
                let totalProgressWeight = 0;
                let totalDuration = 0;
                let minStart = null;
                let maxEnd = null;
                let validChildrenCount = 0;
                
                let hasDelay = false;
                let hasInProgress = false;
                let allComplete = true;

                children.forEach(child => {
                    if (child.type !== 'Milestone') {
                        const startD = parseDate(child.startDate);
                        const endD = parseDate(child.endDate);
                        if (!minStart || startD < minStart) minStart = startD;
                        if (!maxEnd || endD > maxEnd) maxEnd = endD;
                        
                        const duration = diffDays(child.startDate, child.endDate) + 1;
                        totalProgressWeight += (child.progress * duration);
                        totalDuration += duration;
                        
                        if (child.status === 'Delay') hasDelay = true;
                        if (child.status === 'In Progress') hasInProgress = true;
                        if (child.status !== 'Complete') allComplete = false;
                        
                        validChildrenCount++;
                    }
                });

                if (validChildrenCount > 0) {
                    if (totalDuration > 0) {
                        node.progress = totalProgressWeight / totalDuration;
                    } else {
                        node.progress = totalProgressWeight / validChildrenCount;
                    }
                    if (minStart) node.startDate = formatDate(minStart);
                    if (maxEnd) node.endDate = formatDate(maxEnd);
                    
                    if (hasDelay) {
                        node.status = 'Delay';
                    } else if (allComplete) {
                        node.status = 'Complete';
                    } else if (hasInProgress || node.progress > 0) {
                        node.status = 'In Progress';
                    } else {
                        node.status = 'Not Started';
                    }
                } else {
                    node.status = calculateStatus(node.progress, node.startDate, node.endDate);
                }
                return node;
            };

            const rootNodes = newItems.filter(item => !item.parentId);
            rootNodes.forEach(root => calcNode(root));
            return newItems;
        };

        const cascadeDependencies = (items, startNodeId) => {
            let currentItems = JSON.parse(JSON.stringify(items));
            let loopGuard = 0;
            let changed = true;

            currentItems = recalculateTree(currentItems);

            while (changed && loopGuard < 100) {
                changed = false;
                loopGuard++;

                for (let i = 0; i < currentItems.length; i++) {
                    const task = currentItems[i];
                    if (!task.predecessors || task.predecessors.length === 0) continue;

                    const isParent = currentItems.some(c => c.parentId === task.id && c.type !== 'Milestone');
                    if (isParent) continue;

                    let maxEndDateStr = null;
                    task.predecessors.forEach(predId => {
                        const pred = currentItems.find(p => p.id === predId);
                        if (pred && pred.endDate && (!maxEndDateStr || pred.endDate > maxEndDateStr)) {
                            maxEndDateStr = pred.endDate;
                        }
                    });

                    if (maxEndDateStr) {
                        const expectedStartD = parseDate(maxEndDateStr);
                        expectedStartD.setDate(expectedStartD.getDate() + 1); 
                        const expectedStartStr = formatDate(expectedStartD);

                        if (task.startDate && task.startDate < expectedStartStr) {
                            const diffDaysSigned = diffDays(task.startDate, expectedStartStr);
                            if (task.startDate) task.startDate = addDays(task.startDate, diffDaysSigned);
                            if (task.endDate) task.endDate = addDays(task.endDate, diffDaysSigned);
                            changed = true;
                        }
                    }
                }
                if (changed) {
                    currentItems = recalculateTree(currentItems);
                }
            }
            return currentItems;
        };

        const Icons = {
            Project: () => <svg className="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>,
            Job: () => <svg className="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>,
            Task: () => <svg className="w-4 h-4 text-indigo-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>,
            'Sub-task': () => <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Milestone: () => <svg className="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>,
            Add: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>,
            Delete: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
            Warning: () => <svg className="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>,
            Undo: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>,
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"></path></svg>,
            Gantt: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>,
            Filter: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>,
            Pin: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13l-3 3m0 0l-3-3m3 3V8m0 13a9 9 0 110-18 9 9 0 010 18z"></path></svg>,
            Download: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>,
            Upload: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>,
            Excel: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Lock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>,
            Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>,
            Calendar: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        const ALL_COLUMNS = [
            { id: 'taskName', label: 'Task Name' },
            { id: 'pic', label: 'PIC' },
            { id: 'status', label: 'Status', center: true },
            { id: 'progress', label: '%', center: true },
            { id: 'startDate', label: 'Start' },
            { id: 'endDate', label: 'End' },
            { id: 'remark', label: 'Remark' },
            { id: 'act', label: 'Act', center: true }
        ];

        const Dashboard = ({ items }) => {
            const tasks = items.filter(i => i.type !== 'Project' && i.type !== 'Milestone');
            const delayedTasks = tasks.filter(t => t.status === 'Delay');
            const completeTasks = tasks.filter(t => t.status === 'Complete');
            
            const totalProgress = items.filter(i => i.type === 'Project').reduce((acc, curr, _, arr) => acc + (curr.progress / arr.length), 0);

            return (
                <div className="p-6 overflow-y-auto h-full bg-slate-50">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Dashboard Overview</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Overall Progress</span>
                            <span className="text-4xl font-bold text-blue-600">{Math.round(totalProgress || 0)}%</span>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Total Tasks</span>
                            <span className="text-4xl font-bold text-slate-700">{tasks.length}</span>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Delayed Tasks</span>
                            <span className="text-4xl font-bold text-rose-500">{delayedTasks.length}</span>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Completed</span>
                            <span className="text-4xl font-bold text-emerald-500">{completeTasks.length}</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                            <h3 className="text-lg font-semibold text-slate-800 mb-4">Delayed Tasks Action List</h3>
                            {delayedTasks.length === 0 ? (
                                <p className="text-slate-500 text-sm">No delayed tasks! Good job.</p>
                            ) : (
                                <ul className="space-y-3">
                                    {delayedTasks.map(t => (
                                        <li key={t.id} className="flex justify-between items-center p-3 bg-rose-50 rounded-lg">
                                            <div>
                                                <span className="font-medium text-slate-800 block">{t.taskName}</span>
                                                <span className="text-xs text-slate-500">PIC: {t.pic} | Due: {t.endDate}</span>
                                            </div>
                                            <span className="px-2 py-1 bg-rose-100 text-rose-700 text-xs font-bold rounded">Delay</span>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                            <h3 className="text-lg font-semibold text-slate-800 mb-4">Project Summaries</h3>
                            <ul className="space-y-4">
                                {items.filter(i => i.type === 'Project').map(p => (
                                    <li key={p.id}>
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="font-medium text-slate-800 flex items-center gap-2">
                                                <Icons.Project /> {p.taskName}
                                            </span>
                                            <span className="text-sm font-semibold">{Math.round(p.progress || 0)}%</span>
                                        </div>
                                        <div className="w-full bg-slate-100 rounded-full h-2">
                                            <div className={`bg-blue-600 h-2 rounded-full`} style={{ width: `${p.progress || 0}%` }}></div>
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const GanttRow = ({ isEditMode, item, level, minDate, dayWidth, onUpdateField, onOpenAddMenu, onDelete, updateDates, onPreviewDates, allItems, toggleCollapse, colWidths, totalLeftWidth, onContextMenu, isDrawingTarget, completeDrawing, scrollContainerRef, frozenColumn, handleAddNewRoot }) => {
            const [localItem, setLocalItem] = useState(item);
            const [dragState, setDragState] = useState({ active: false, deltaX: 0, type: null });
            const [isEditingRemark, setIsEditingRemark] = useState(false);
            
            const currentDeltaDaysRef = useRef(0);
            
            useEffect(() => { 
                if (!dragState.active) {
                    setLocalItem(item); 
                }
            }, [item, dragState.active]);

            const handleBlur = (field, forceValue) => {
                const valToSave = forceValue !== undefined ? forceValue : localItem[field];
                if (valToSave !== item[field]) {
                    onUpdateField(item.id, field, valToSave);
                }
            };

            const handleChange = (field, val) => {
                setLocalItem(prev => ({...prev, [field]: val}));
            };

            const handleKeyDown = (field, e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.target.blur(); 
                }
            };

            const Icon = Icons[item.type] || Icons.Task;
            const isMilestone = item.type === 'Milestone';
            
            let baseLeft = 0;
            let baseWidth = 0;
            let startOffset = 0;
            let duration = 0;

            if (!isMilestone && localItem.startDate && localItem.endDate) {
                startOffset = diffDays(formatDate(minDate), localItem.startDate);
                duration = diffDays(localItem.startDate, localItem.endDate) + 1;
                baseLeft = startOffset * dayWidth;
                baseWidth = duration * dayWidth;
            }

            const statusColors = {
                'Complete': { bg: 'bg-emerald-100', text: 'text-emerald-700' },
                'Delay': { bg: 'bg-rose-100', text: 'text-rose-700' },
                'In Progress': { bg: 'bg-blue-100', text: 'text-blue-700' },
                'Not Started': { bg: 'bg-slate-100', text: 'text-slate-700' }
            }[localItem.status] || { bg: 'bg-slate-100', text: 'text-slate-700' };

            const barTheme = {
                'Complete': { bg: 'bg-emerald-100', border: 'border-emerald-300', text: 'text-emerald-800' },
                'Delay': { bg: 'bg-rose-100', border: 'border-rose-300', text: 'text-rose-800' },
                'In Progress': { bg: 'bg-blue-100', border: 'border-blue-300', text: 'text-blue-800' },
                'Not Started': { bg: 'bg-slate-100', border: 'border-slate-300', text: 'text-slate-800' },
            }[item.status] || { bg: 'bg-slate-100', border: 'border-slate-300', text: 'text-slate-800' };

            const handleDateChange = (field, e) => {
                const val = e.target.value;
                const formattedDate = val ? val.replace(/-/g, '.') : getTodayStr();
                handleChange(field, formattedDate);
                handleBlur(field, formattedDate);
            };

            const handleInteraction = (e, type) => {
                if (!isEditMode) return;
                if (e.button === 2) return;
                if (isMilestone) return; 
                e.preventDefault();
                e.stopPropagation();
                
                if (isDrawingTarget && type === 'move') {
                    completeDrawing(item.id);
                    return;
                }

                const startX = e.clientX;
                const initialStart = localItem.startDate;
                const initialEnd = localItem.endDate;
                const initialProgress = localItem.progress || 0;
                const initialScrollLeft = scrollContainerRef.current ? scrollContainerRef.current.scrollLeft : 0;
                
                currentDeltaDaysRef.current = 0;
                let lastClientX = startX;

                const updateDrag = (clientX) => {
                    if (type === 'progress') {
                         const scrollDelta = scrollContainerRef.current ? scrollContainerRef.current.scrollLeft - initialScrollLeft : 0;
                         const totalDeltaX = (clientX - startX) + scrollDelta;
                         const deltaPercent = (totalDeltaX / Math.max(baseWidth, dayWidth)) * 100;
                         let newProg = Math.round(initialProgress + deltaPercent);
                         newProg = Math.max(0, Math.min(100, newProg));
                         setLocalItem(prev => ({...prev, progress: newProg}));
                    } else {
                         const currentScrollLeft = scrollContainerRef.current ? scrollContainerRef.current.scrollLeft : 0;
                         const deltaX = (clientX - startX) + (currentScrollLeft - initialScrollLeft);
                         
                         setDragState({ active: true, deltaX, type });
                         
                         const deltaDays = Math.round(deltaX / dayWidth);
                         if (deltaDays !== currentDeltaDaysRef.current) {
                             currentDeltaDaysRef.current = deltaDays;
                             
                             let newStart = initialStart;
                             let newEnd = initialEnd;

                             if (type === 'move') {
                                 newStart = addDays(initialStart, deltaDays);
                                 newEnd = addDays(initialEnd, deltaDays);
                             } else if (type === 'resize-left') {
                                 newStart = addDays(initialStart, deltaDays);
                                 if (newStart > newEnd) newStart = newEnd;
                             } else if (type === 'resize-right') {
                                 newEnd = addDays(initialEnd, deltaDays);
                                 if (newEnd < newStart) newEnd = newStart;
                             }
                             
                             onPreviewDates(item.id, newStart, newEnd);
                         }
                    }
                };

                let rafId = null;
                const scrollLoop = () => {
                    const scrollEl = scrollContainerRef.current;
                    if (scrollEl) {
                        const scrollRect = scrollEl.getBoundingClientRect();
                        const edgeThreshold = 80;
                        const maxSpeed = 15;
                        let speed = 0;
                        
                        const frozenColIndex = ALL_COLUMNS.findIndex(c => c.id === frozenColumn);
                        const frozenCols = ALL_COLUMNS.slice(0, frozenColIndex + 1);
                        const currentFrozenWidth = frozenCols.reduce((sum, col) => sum + colWidths[col.id], 0);

                        const visibleLeftEdge = scrollRect.left + Math.max(currentFrozenWidth, totalLeftWidth - scrollEl.scrollLeft);
                        
                        if (lastClientX < visibleLeftEdge + edgeThreshold) {
                            const dist = (visibleLeftEdge + edgeThreshold) - lastClientX;
                            speed = -Math.min(maxSpeed, (dist / edgeThreshold) * maxSpeed);
                        } else if (lastClientX > scrollRect.right - edgeThreshold) {
                            const dist = lastClientX - (scrollRect.right - edgeThreshold);
                            speed = Math.min(maxSpeed, (dist / edgeThreshold) * maxSpeed);
                        }

                        if (speed !== 0) {
                            scrollEl.scrollBy({ left: speed });
                            updateDrag(lastClientX); 
                        }
                    }
                    rafId = requestAnimationFrame(scrollLoop);
                };

                const onMouseMove = (moveEvent) => {
                    lastClientX = moveEvent.clientX;
                    updateDrag(lastClientX);
                    
                    if (type === 'progress' && !dragState.active) {
                        setDragState({ active: true, deltaX: 0, type });
                    }
                };

                const onMouseUp = (upEvent) => {
                    lastClientX = upEvent.clientX;
                    cancelAnimationFrame(rafId);
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);

                    if (type === 'progress') {
                         const scrollDelta = scrollContainerRef.current ? scrollContainerRef.current.scrollLeft - initialScrollLeft : 0;
                         const totalDeltaX = (lastClientX - startX) + scrollDelta;
                         const deltaPercent = (totalDeltaX / Math.max(baseWidth, dayWidth)) * 100;
                         let newProg = Math.round(initialProgress + deltaPercent);
                         newProg = Math.max(0, Math.min(100, newProg));
                         handleBlur('progress', newProg);
                    } else {
                         const currentScrollLeft = scrollContainerRef.current ? scrollContainerRef.current.scrollLeft : 0;
                         const deltaX = (lastClientX - startX) + (currentScrollLeft - initialScrollLeft);
                         const deltaDays = Math.round(deltaX / dayWidth);
                         
                         if (deltaDays !== 0) {
                             let newStart = initialStart;
                             let newEnd = initialEnd;
                             if (type === 'move') {
                                 newStart = addDays(initialStart, deltaDays);
                                 newEnd = addDays(initialEnd, deltaDays);
                             } else if (type === 'resize-left') {
                                 newStart = addDays(initialStart, deltaDays);
                                 if (newStart > newEnd) newStart = newEnd;
                             } else if (type === 'resize-right') {
                                 newEnd = addDays(initialEnd, deltaDays);
                                 if (newEnd < newStart) newEnd = newStart;
                             }
                             updateDates(item.id, newStart, newEnd);
                         } else {
                             setLocalItem(item);
                             updateDates(item.id, initialStart, initialEnd);
                         }
                    }
                    setDragState({ active: false, deltaX: 0, type: null });
                };

                if (type !== 'progress') {
                    setDragState({ active: true, deltaX: 0, type });
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                rafId = requestAnimationFrame(scrollLoop);
            };

            const canEditProgress = !item.isCalculatingParent && !isMilestone;

            let renderLeft = baseLeft;
            let renderWidth = Math.max(baseWidth, dayWidth);

            if (dragState.active && !isMilestone) {

                    renderLeft += dragState.deltaX;
                } else if (dragState.type === 'resize-left') {
                    const proposedLeft = baseLeft + dragState.deltaX;

                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-l:bg-blue-500 transition-colors"></div>
                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-l:bg-blue-500 transition-colors"></div>
                                            </div>
                                        </div>
                                    )}

                                    <div 
                                        className={`absolute inset-0 flex items-center px-2 truncate z-20 ${(!item.isCalculatingParent && isEditMode) ? 'cursor-grab active:cursor-grabbing' : 'cursor-default'} ${isDrawingTarget ? 'cursor-crosshair' : ''}`}
                                        onMouseDown={e => {
                                            if (!isEditMode) return;
                                            if (isDrawingTarget) handleInteraction(e, 'move');
                                            else if (!item.isCalculatingParent) handleInteraction(e, 'move');
                                        }}
                                    >
                                        {renderWidth > 30 && <span className="font-semibold drop-shadow-sm pointer-events-none select-none relative z-20 truncate block">{item.taskName} {Math.round(localItem.progress || 0)}%</span>}
                                    </div>

                                    {isEditMode && !item.isCalculatingParent && (
                                        <div 
                                            className="absolute right-0 top-0 bottom-0 w-4 cursor-ew-resize z-50 flex items-center justify-end group/res-r translate-x-1" 
                                            onMouseDown={e => handleInteraction(e, 'resize-right')}
                                            title="Adjust End Date"
                                        >
                                            <div className="w-1.5 h-3.5 bg-white border border-slate-400 rounded-[2px] shadow-sm opacity-0 group-hover:opacity-100 group-hover/res-r:border-blue-500 group-hover/res-r:bg-blue-50 transition-all flex items-center justify-center gap-[1px]">
                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-r:bg-blue-500 transition-colors"></div>
                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-r:bg-blue-500 transition-colors"></div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )
                        )}
                    </div>
                </div>
            );
        };

        const GanttChart = ({ isEditMode, items, scale, onUpdateField, onAddChild, onDelete, updateDates, previewDates, collapsedIds, toggleCollapse, colWidths, setColWidths, handleAddDependency, handleRemoveDependencies, frozenColumn, setFrozenColumn, picFilter, statusFilter, handleAddNewRoot, customHolidays }) => {
            const chartRef = useRef(null);
            const scrollRef = useRef(null);
            
            const specialDatesMap = new Map((customHolidays || []).map(h => [h.date, { type: h.type || 'holiday', label: h.label }]));
            
            // Build visibleIds recursively to ensure full hierarchy is shown when filtered
            let visibleIds = new Set(items.map(i => i.id));
            if (picFilter !== 'All' || statusFilter !== 'All') {
                const matches = items.filter(i => {
                    if (i.type !== 'Job') return false;
                    let passPic = picFilter === 'All' || i.pic === picFilter;
                    let passStatus = statusFilter === 'All' || i.status === statusFilter;
                    return passPic && passStatus;
                });
                visibleIds = new Set();
                const addAncestors = (id) => {
                    if (!id || visibleIds.has(id)) return;
                    visibleIds.add(id);
                    const item = items.find(i => i.id === id);
                    if (item && item.parentId) addAncestors(item.parentId);
                };
                const addDescendants = (id) => {
                    if (!id) return;
                    visibleIds.add(id);
                    items.filter(i => i.parentId === id).forEach(child => addDescendants(child.id));
                };
                matches.forEach(m => {
                    addAncestors(m.id);
                    addDescendants(m.id);
                });
            }

            const allDates = items.filter(i => visibleIds.has(i.id)).flatMap(i => {
                const dates = [];
                if (i.startDate) dates.push(parseDate(i.startDate));
                if (i.endDate) dates.push(parseDate(i.endDate));
                if (i.milestoneConfig && i.milestoneConfig.items) {
                    i.milestoneConfig.items.forEach(mi => {
                        if (mi.date) dates.push(parseDate(mi.date));
                        if (mi.startDate) dates.push(parseDate(mi.startDate));
                        if (mi.endDate) dates.push(parseDate(mi.endDate));
                    });
                }
                return dates;
            });

            let minDate = new Date();
            let maxDate = new Date();
            
            if (allDates.length > 0) {
                minDate = new Date(Math.min(...allDates));
                maxDate = new Date(Math.max(...allDates));
            }
            
            minDate.setDate(minDate.getDate() - 7);
            maxDate.setDate(maxDate.getDate() + 14);

            const totalDays = diffDays(formatDate(minDate), formatDate(maxDate));
            const scales = { day: 30, week: 10, month: 3 };
            const dayWidth = scales[scale] || 30;

            const buildTree = (parentId, level) => {
                return items
                    .filter(i => i.parentId === parentId && visibleIds.has(i.id))
                    .sort((a,b) => a.sortOrder - b.sortOrder)
                    .flatMap(item => {
                        const hasChildren = items.some(i => i.parentId === item.id && visibleIds.has(i.id));
                        const hasDependentChildren = items.some(i => i.parentId === item.id && i.type !== 'Milestone');
                        const isCollapsed = collapsedIds.includes(item.id);
                        const isCalculatingParent = hasDependentChildren && item.type !== 'Milestone';
                        const node = { ...item, level, hasChildren, isCollapsed, isCalculatingParent };
                        if (isCollapsed) return [node];
                        return [node, ...buildTree(item.id, level + 1)];
                    });
            };
            const displayItems = buildTree(null, 0);

            const headers = [];
            let currentDate = new Date(minDate);
            for (let i = 0; i <= totalDays; i++) {
                headers.push(new Date(currentDate));
                currentDate.setDate(currentDate.getDate() + 1);
            }

            const topLabels = [];
            const bottomLabels = [];

            if (scale === 'day') {
                let curMonth = null;
                headers.forEach((d, i) => {
                    const mKey = d.getFullYear() + '-' + d.getMonth();
                    if (!curMonth || curMonth.key !== mKey) {
                        if (curMonth) topLabels.push(curMonth);
                        curMonth = { key: mKey, label: d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }), start: i, width: 1 };
                    } else {
                        curMonth.width++;
                    }
                    
                    const dStr = formatDate(d);
                    const specialDateInfo = specialDatesMap.get(dStr);
                    const sType = specialDateInfo ? specialDateInfo.type : null;
                    const isVisualHoliday = sType === 'working_day' ? false : (sType === 'holiday' ? true : (d.getDay() === 0 || d.getDay() === 6));
                    
                    bottomLabels.push({ 
                        label: d.getDate(), 
                        dayName: d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase(),
                        start: i, 
                        width: 1, 
                        isHoliday: isVisualHoliday,
                        tooltip: specialDateInfo ? specialDateInfo.label : ''
                    });
                });
                if (curMonth) topLabels.push(curMonth);
            } else if (scale === 'week') {
                let curMonth = null;
                let curWeek = null;
                headers.forEach((d, i) => {
                    const mKey = d.getFullYear() + '-' + d.getMonth();
                    if (!curMonth || curMonth.key !== mKey) {
                        if (curMonth) topLabels.push(curMonth);
                        curMonth = { key: mKey, label: d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }), start: i, width: 1 };
                    } else {
                        curMonth.width++;
                    }
                    
                    const isMonday = d.getDay() === 1;
                    if (!curWeek || isMonday || d.getDate() === 1) { 
                        if (curWeek) bottomLabels.push(curWeek);
                        const wn = Math.ceil(d.getDate() / 7);
                        curWeek = { label: `Week ${wn}`, start: i, width: 1 };
                    } else {
                        curWeek.width++;
                    }
                });
                if (curMonth) topLabels.push(curMonth);
                if (curWeek) bottomLabels.push(curWeek);
            } else if (scale === 'month') {
                let curYear = null;
                let curMonth = null;
                headers.forEach((d, i) => {
                    const yKey = d.getFullYear();
                    if (!curYear || curYear.key !== yKey) {
                        if (curYear) topLabels.push(curYear);
                        curYear = { key: yKey, label: d.getFullYear(), start: i, width: 1 };
                    } else {
                        curYear.width++;
                    }
                    const mKey = d.getMonth();
                    if (!curMonth || curMonth.key !== mKey) {
                        if (curMonth) bottomLabels.push(curMonth);
                        curMonth = { key: mKey, label: d.toLocaleDateString('en-US', { month: 'short' }), start: i, width: 1 };
                    } else {
                        curMonth.width++;
                    }
                });
                if (curYear) topLabels.push(curYear);
                if (curMonth) bottomLabels.push(curMonth);
            }

            const totalLeftWidth = Object.values(colWidths).reduce((a, b) => a + b, 0);

            const handleResizeStart = (e, col) => {
                e.preventDefault();
                const startX = e.clientX;
                const startWidth = colWidths[col];

                const onMouseMove = (moveEvent) => {
                    const delta = moveEvent.clientX - startX;
                    setColWidths(prev => ({
                        ...prev,
                        [col]: Math.max(30, startWidth + delta)
                    }));
                };

                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };

            const frozenColIndex = ALL_COLUMNS.findIndex(c => c.id === frozenColumn);
            const frozenCols = ALL_COLUMNS.slice(0, frozenColIndex + 1);
            const scrollableCols = ALL_COLUMNS.slice(frozenColIndex + 1);
            
            const currentFrozenWidth = frozenCols.reduce((sum, col) => sum + colWidths[col.id], 0);
            const scrollableLeftWidth = totalLeftWidth - currentFrozenWidth;

            const todayOffset = diffDays(formatDate(minDate), getTodayStr());
            const todayLeft = todayOffset * dayWidth;

            const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
            const [drawingState, setDrawingState] = useState({ active: false, sourceId: null, currentX: 0, currentY: 0 });
            
            const [addMenu, setAddMenu] = useState({ visible: false, x: 0, y: 0, parentId: null, parentType: null });
            const [milestoneConfigMenu, setMilestoneConfigMenu] = useState({ visible: false, taskId: null });

            const drawingRafRef = useRef(null);
            const lastMousePosRef = useRef({x: 0, y: 0});

            useEffect(() => {
                const handleGlobalClick = (e) => {
                    if (!e.target.closest('.context-menu-popup')) {
                        setContextMenu({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
                        setAddMenu({ visible: false, x: 0, y: 0, parentId: null, parentType: null });
                    }
                };
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        if (drawingRafRef.current) cancelAnimationFrame(drawingRafRef.current);
                        setDrawingState({ active: false, sourceId: null, currentX: 0, currentY: 0 });
                        setMilestoneConfigMenu({ visible: false, taskId: null });
                    }
                };
                const handleGlobalMouseUp = () => {
                     setDrawingState(prev => {
                         if (prev.active) {
                             if (drawingRafRef.current) cancelAnimationFrame(drawingRafRef.current);
                             return { active: false, sourceId: null, currentX: 0, currentY: 0 };
                         }
                         return prev;
                     });
                };
                window.addEventListener('click', handleGlobalClick);
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('mouseup', handleGlobalMouseUp);
                return () => {
                    window.removeEventListener('click', handleGlobalClick);
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('mouseup', handleGlobalMouseUp);
                };
            }, []);

            const handleContextMenu = (e, taskId, menuType) => {
                e.preventDefault();
                if (!isEditMode) return;
                if (menuType === 'milestoneConfig') {
                    setMilestoneConfigMenu({ visible: true, taskId });
                } else {
                    setContextMenu({ visible: true, x: e.clientX, y: e.clientY, type: menuType, targetId: taskId, sourceId: null });
                }
            };

            const handleLineContextMenu = (e, sourceId, targetId) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isEditMode) return;
                setContextMenu({ visible: true, x: e.clientX, y: e.clientY, type: 'line', targetId: targetId, sourceId: sourceId });
            };
            
            const handleOpenAddMenu = (e, parentId, parentType) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isEditMode) return;
                setAddMenu({ visible: true, x: e.clientX, y: e.clientY, parentId, parentType });
            };

            const startDrawing = (sourceId) => {
                setDrawingState({ active: true, sourceId, currentX: 0, currentY: 0 });
                const scrollLoop = () => {
                    const scrollEl = scrollRef.current;
                    if (scrollEl) { 
                        const scrollRect = scrollEl.getBoundingClientRect();
                        const edgeThreshold = 80;
                        const maxSpeed = 15;
                        let speed = 0;
                        const { x: clientX, y: clientY } = lastMousePosRef.current;
                        
                        const visibleLeftEdge = scrollRect.left + Math.max(currentFrozenWidth, totalLeftWidth - scrollEl.scrollLeft);
                        
                        if (clientX > 0) { 
                            if (clientX < visibleLeftEdge + edgeThreshold) {
                                const dist = (visibleLeftEdge + edgeThreshold) - clientX;
                                speed = -Math.min(maxSpeed, (dist / edgeThreshold) * maxSpeed);
                            } else if (clientX > scrollRect.right - edgeThreshold) {
                                const dist = clientX - (scrollRect.right - edgeThreshold);
                                speed = Math.min(maxSpeed, (dist / edgeThreshold) * maxSpeed);
                            }
                            if (speed !== 0) scrollEl.scrollBy({ left: speed });
                            
                            setDrawingState(prev => {
                                if(!prev.active) return prev;
                                return {
                                    ...prev,
                                    currentX: clientX - scrollRect.left + scrollEl.scrollLeft - totalLeftWidth,
                                    currentY: clientY - scrollRect.top + scrollEl.scrollTop - 56
                                };
                            });
                        }
                    }
                    drawingRafRef.current = requestAnimationFrame(scrollLoop);
                };
                drawingRafRef.current = requestAnimationFrame(scrollLoop);
            };

            const completeDrawing = (targetId) => {
                if (drawingRafRef.current) cancelAnimationFrame(drawingRafRef.current);
                if (drawingState.sourceId && drawingState.sourceId !== targetId) {
                    handleAddDependency(drawingState.sourceId, targetId);
                }
                setDrawingState({ active: false, sourceId: null, currentX: 0, currentY: 0 });
            };

            const handleChartMouseMove = (e) => {
                if (!drawingState.active || !scrollRef.current) return;
                lastMousePosRef.current = { x: e.clientX, y: e.clientY };
                const rect = scrollRef.current.getBoundingClientRect();
                setDrawingState(prev => ({
                    ...prev,
                    currentX: e.clientX - rect.left + scrollRef.current.scrollLeft - totalLeftWidth,
                    currentY: e.clientY - rect.top + scrollRef.current.scrollTop - 56
                }));
            };

            const getTaskCoords = (taskId, position = 'right') => {
                const index = displayItems.findIndex(i => i.id === taskId);
                if (index === -1) return null;

                const item = displayItems[index];
                if (!item.startDate || !item.endDate) return null;
                
                const startOffset = diffDays(formatDate(minDate), item.startDate);
                const duration = diffDays(item.startDate, item.endDate) + 1;
                
                const left = startOffset * dayWidth;
                const width = duration * dayWidth;
                
                const y = (index * 28) + 14; 
                const x = position === 'right' ? left + width : left;

                return { x, y };
            };

            const createPath = (x1, y1, x2, y2) => {
                const buffer = 15;
                if (x2 > x1 + buffer) {
                    return `M ${x1} ${y1} L ${x1 + buffer} ${y1} L ${x1 + buffer} ${y2} L ${x2} ${y2}`;
                } else {
                    const midY = y1 + (y2 - y1) / 2;
                    return `M ${x1} ${y1} L ${x1 + buffer} ${y1} L ${x1 + buffer} ${midY} L ${x2 - buffer} ${midY} L ${x2 - buffer} ${y2} L ${x2} ${y2}`;
                }
            };
            
            const renderHeaderCell = (col) => (
                <div key={`header-${col.id}`} style={{ width: `${colWidths[col.id]}px` }} className={`relative shrink-0 flex items-center group/col ${col.center ? 'justify-center' : 'px-1'} ${col.id === 'pic' || col.id === 'status' ? 'cursor-pointer hover:bg-slate-200/50' : ''}`} onClick={(e) => {
                    if (col.id === 'pic' || col.id === 'status') {
                        e.stopPropagation();
                        setContextMenu({ visible: true, x: e.clientX, y: e.clientY, type: `${col.id}Filter` });
                    }
                }}>
                    {isEditMode && col.id === 'taskName' && (
                        <button onClick={handleAddNewRoot} className="absolute top-0 left-0 text-blue-600 hover:text-blue-800 text-xs font-bold transition-colors z-[60] px-1 py-0.5">
                            + New Project
                        </button>
                    )}
                    <div className={`flex items-center gap-1 overflow-hidden w-full relative ${col.id === 'taskName' ? 'pt-5' : ''}`}>
                        <button 
                            onClick={(e) => { e.stopPropagation(); setFrozenColumn(col.id); }} 
                            className={`flex-none hover:text-blue-600 transition-colors ${frozenColumn === col.id ? 'text-blue-500 opacity-100' : 'text-slate-300 opacity-0 group-hover/col:opacity-100'}`}
                            title="Pin to freeze panel here"
                        >
                            <Icons.Pin />
                        </button>
                        <span className={`truncate ${col.center ? 'text-center' : ''}`}>{col.label}</span>
                        {(col.id === 'pic' && picFilter !== 'All') && <div className="absolute right-2 w-1.5 h-1.5 rounded-full bg-blue-500"></div>}
                        {(col.id === 'status' && statusFilter !== 'All') && <div className="absolute right-2 w-1.5 h-1.5 rounded-full bg-blue-500"></div>}
                    </div>
                    <div className="absolute right-0 top-0 bottom-0 w-2 -mr-1 cursor-col-resize hover:bg-blue-400/50 z-10 opacity-0 group-hover/col:opacity-100 transition-opacity" onMouseDown={e => handleResizeStart(e, col.id)}></div>
                </div>
            );

            return (
                <div className="flex flex-col h-full bg-white overflow-hidden" ref={chartRef}>
                    <div className="flex-1 overflow-auto flex relative" ref={scrollRef} onMouseMove={handleChartMouseMove}>
                        <div className="min-w-max flex flex-col relative pb-32">
                            
                            <div className="flex border-b border-slate-200 bg-slate-50 sticky top-0 z-[60] h-14 shadow-sm">
                                <div className="flex-none bg-slate-50 border-r border-slate-200 z-50 sticky left-0 flex items-end pb-2 isolate shadow-[4px_0_12px_rgba(0,0,0,0.03)]" style={{ width: `${currentFrozenWidth}px` }}>
                                    <div className="flex w-full text-[11px] font-bold text-slate-500 uppercase tracking-wider items-center">
                                        {frozenCols.map(col => renderHeaderCell(col))}
                                    </div>
                                </div>

                                <div className="flex-none bg-slate-50 border-r border-slate-200 z-40 flex items-end pb-2" style={{ width: `${scrollableLeftWidth}px` }}>
                                    <div className="flex w-full text-[11px] font-bold text-slate-500 uppercase tracking-wider items-center">
                                        {scrollableCols.map(col => renderHeaderCell(col))}
                                    </div>
                                </div>
                                
                                <div className="flex-1 relative" style={{ width: `${(totalDays + 1) * dayWidth}px`, minWidth: '100%' }}>
                                    <div className="absolute top-0 left-0 w-full h-7 border-b border-slate-200">
                                        {topLabels.map((lbl, i) => (
                                            <div key={`top-${i}`} className="absolute h-full flex items-center justify-center text-[11px] font-bold text-slate-700 border-r border-slate-200 px-1 overflow-hidden bg-slate-100/30" style={{ left: `${lbl.start * dayWidth}px`, width: `${lbl.width * dayWidth}px` }}>
                                                <span className="truncate">{lbl.label}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="absolute top-7 left-0 w-full h-7">
                                        {bottomLabels.map((lbl, i) => (
                                            <div 
                                                key={`bot-${i}`} 
                                                className={`group absolute h-full flex flex-col items-center justify-center border-r border-slate-200 hover:z-50 ${lbl.isHoliday && scale === 'day' ? 'bg-slate-200/50 text-slate-500' : 'text-slate-600'} ${lbl.tooltip ? 'cursor-help' : ''}`} 
                                                style={{ left: `${lbl.start * dayWidth}px`, width: `${lbl.width * dayWidth}px` }}
                                            >
                                                {lbl.dayName ? (
                                                    <div className="pointer-events-none flex flex-col items-center justify-center w-full h-full">
                                                        <span className="text-[6.5px] leading-[8px] font-bold uppercase opacity-60 tracking-tighter">{lbl.dayName}</span>
                                                        <span className="text-[10px] leading-[12px] font-medium truncate">{lbl.label}</span>
                                                    </div>
                                                ) : (
                                                    <span className="text-[10px] font-medium truncate pointer-events-none px-1">{lbl.label}</span>
                                                )}
                                                {lbl.tooltip && (
                                                    <div className="absolute top-[calc(100%+4px)] left-1/2 -translate-x-1/2 px-2 py-1 bg-slate-800 text-white text-[10px] font-normal whitespace-nowrap rounded shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] pointer-events-none">
                                                        {lbl.tooltip}
                                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 border-[4px] border-transparent border-b-slate-800"></div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="relative">
                                <svg className="absolute top-0 pointer-events-none" style={{ left: `${totalLeftWidth}px`, width: `${(totalDays + 1) * dayWidth}px`, height: '100%', zIndex: 5 }}>
                                    <defs>
                                        <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                                            <polygon points="0 0, 6 2, 0 4" fill="#94a3b8" />
                                        </marker>
                                        <marker id="arrowhead-solid" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                                            <polygon points="0 0, 6 2, 0 4" fill="#cbd5e1" />
                                        </marker>
                                    </defs>
                                    
                                    {displayItems.map(item => {
                                        if (item.type === 'Milestone') return null; 
                                        if (!item.predecessors || item.predecessors.length === 0) return null;
                                        return item.predecessors.map(predId => {
                                            const p1 = getTaskCoords(predId, 'right');
                                            const p2 = getTaskCoords(item.id, 'left');
                                            if (!p1 || !p2) return null;
                                            return (
                                                <g 
                                                    key={`${predId}-${item.id}`} 
                                                    className={`group ${isEditMode ? 'cursor-pointer' : 'cursor-default'}`}
                                                    onContextMenu={(e) => isEditMode && handleLineContextMenu(e, predId, item.id)}
                                                >
                                                    <path 
                                                        d={createPath(p1.x, p1.y, p2.x, p2.y)} 
                                                        stroke="transparent" 
                                                        strokeWidth="10" 
                                                        fill="none" 
                                                        className="pointer-events-auto"
                                                    />
                                                    <path 
                                                        d={createPath(p1.x, p1.y, p2.x, p2.y)} 
                                                        className="dependency-line solid pointer-events-none group-hover:stroke-rose-500 transition-colors"
                                                        markerEnd="url(#arrowhead-solid)"
                                                    />
                                                </g>
                                            );
                                        });
                                    })}

                                    {drawingState.active && drawingState.sourceId && (
                                        (() => {
                                            const p1 = getTaskCoords(drawingState.sourceId, 'right');
                                            if (!p1) return null;
                                            return (
                                                <path 
                                                    d={createPath(p1.x, p1.y, drawingState.currentX, drawingState.currentY)} 
                                                    className="dependency-line"
                                                    markerEnd="url(#arrowhead)"
                                                />
                                            );
                                        })()
                                    )}
                                </svg>

                                {todayLeft > 0 && todayLeft < totalDays * dayWidth && (
                                    <div 
                                        className="absolute top-0 bottom-0 border-l-2 border-red-400 border-dashed z-30 pointer-events-none" 
                                        style={{ left: `${totalLeftWidth + todayLeft}px` }}
                                    >
                                        <div className="bg-red-500 text-white text-[9px] px-1 rounded-b absolute top-0 -translate-x-1/2 shadow">TODAY</div>
                                    </div>
                                )}

                                <div className="absolute top-0 bottom-0 pointer-events-none z-0" style={{ left: `${totalLeftWidth}px`, width: `${(totalDays + 1) * dayWidth}px` }}>
                                   {bottomLabels.map((lbl, i) => (

            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;

            items.sort((a,b) => a.sortOrder - b.sortOrder).forEach(item => {

                    item.id, item.parentId || "", item.type, `"${item.taskName.replace(/"/g, '""')}"`,
